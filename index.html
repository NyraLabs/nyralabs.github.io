<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$NYRA - Decentralized AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #05070f; color: #e2e8f0; font-family: sans-serif; }
    .neon-border { border: 1px solid #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
    .neon-btn { background-color: #22d3ee; color: #05070f; font-weight: bold; }
    [lang="ar"] { direction: rtl; font-family: 'Segoe UI', Tahoma, sans-serif; }
  </style>
</head>
<body>

  <div class="fixed top-4 right-4 z-50">
    <button onclick="toggleLang()" class="bg-gray-800 text-white px-3 py-1 rounded text-sm neon-border">
      EN / عربي
    </button>
  </div>

  <section class="pt-20 text-center px-6">
    <div class="max-w-4xl mx-auto">
      <img src="logo.jpg" alt="NYRA Logo" class="w-40 h-40 mx-auto rounded-full shadow-2xl border-4 border-cyan-400 mb-8">
      
      <h1 class="text-5xl font-extrabold text-white mb-6" id="title">
        $NYRA Intelligence
      </h1>
      <p class="text-xl text-slate-400 mb-10" id="desc">
        Decentralized AI on Solana.
      </p>

      <div class="p-4 rounded-xl bg-gray-900 border border-cyan-500 inline-block mb-10">
        <p class="text-xs text-cyan-400">CA:</p>
        <p class="text-white font-mono text-sm">FtwMC2AHWAijoUpU4oE6ce5wTMJvkyJexcETZUWVpump</p>
      </div>

      <div>
        <a href="https://pump.fun/FtwMC2AHWAijoUpU4oE6ce5wTMJvkyJexcETZUWVpump" target="_blank" 
           class="neon-btn px-10 py-4 rounded-xl text-lg transition hover:scale-105" id="buyBtn">
           Buy $NYRA
        </a>
      </div>
    </div>
  </section>

  <script>
    let isAr = false;
    function toggleLang() {
      isAr = !isAr;
      document.documentElement.lang = isAr ? "ar" : "en";
      document.documentElement.dir = isAr ? "rtl" : "ltr";
      
      document.getElementById('title').innerText = isAr ? "$NYRA مستقبل الذكاء الاصطناعي" : "$NYRA Intelligence";
      document.getElementById('desc').innerText = isAr ? "العملة اللامركزية الأولى على Solana." : "Decentralized AI on Solana.";
      document.getElementById('buyBtn').innerText = isAr ? "شراء $NYRA الآن" : "Buy $NYRA";
    }
  </script>
</body>
</html>
